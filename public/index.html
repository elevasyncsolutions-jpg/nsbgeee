<script>
  let lastLogCount = 0;
  async function fetchLogs() {
    const res = await fetch('/api/status');
    const data = await res.json();
    if (data.state.logs.length !== lastLogCount) {
      const container = document.getElementById('logStream');
      container.innerHTML = data.state.logs.map(log => `
        <div class="border-b border-gray-800 p-2 text-xs font-mono">
          <span class="text-gray-500">${new Date(log.time).toLocaleTimeString()}</span>
          <span class="${log.type === 'TRADE' ? 'text-green-400' : 'text-yellow-400'}"> [${log.type}] </span>
          ${log.msg}
        </div>
      `).join('');
      lastLogCount = data.state.logs.length;
    }
  }
  setInterval(fetchLogs, 1000); // UI updates 10x faster
</script>
